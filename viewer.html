<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PermaBrain</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#fff;--surface:#f6f8fa;--text:#1f2328;--muted:#656d76;--accent:#0969da;--green:#1a7f37;--orange:#9a6700;--border:#d0d7de;--card:#eef1f4;--sidebar:300px}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;background:var(--bg);color:var(--text);line-height:1.6}
.app{display:flex;min-height:100vh}
.sidebar{width:var(--sidebar);background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;transition:transform .2s}
.sidebar-header{padding:1rem 1rem 0.5rem;border-bottom:1px solid var(--border)}
.sidebar-header h1{font-size:1.1rem;margin-bottom:0.1rem}
.sidebar-header h1 span{color:var(--accent)}
.sidebar-header .subtitle{font-size:0.75rem;color:var(--muted)}
.search{width:100%;padding:0.5rem 0.75rem;border:1px solid var(--border);border-radius:6px;font-size:0.85rem;background:var(--bg);color:var(--text);margin-top:0.5rem}
.search:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 2px rgba(9,105,218,0.2)}
.filters{display:flex;flex-wrap:wrap;gap:0.35rem;padding:0.5rem 1rem;border-bottom:1px solid var(--border)}
.filter-btn{padding:0.2rem 0.6rem;border:1px solid var(--border);border-radius:12px;font-size:0.72rem;background:var(--bg);color:var(--muted);cursor:pointer;transition:all .15s}
.filter-btn:hover{border-color:var(--accent);color:var(--accent)}
.filter-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.status-bar{padding:0.4rem 1rem;font-size:0.72rem;color:var(--muted);border-bottom:1px solid var(--border);display:flex;justify-content:space-between}
.article-list{flex:1;overflow-y:auto;padding:0.5rem 0}
.article-item{padding:0.6rem 1rem;cursor:pointer;border-left:3px solid transparent;transition:all .15s}
.article-item:hover{background:var(--card)}
.article-item.selected{background:#ddf4ff;border-left-color:var(--accent)}
.article-item .key{font-family:monospace;font-size:0.72rem;color:var(--accent)}
.article-item .title{font-size:0.9rem;font-weight:600;margin:0.15rem 0}
.article-item .meta{font-size:0.72rem;color:var(--muted)}
.main{flex:1;overflow-y:auto;padding:2rem 2.5rem;max-width:820px}
.article-header{margin-bottom:1.5rem}
.article-header .badges{display:flex;align-items:center;gap:0.5rem;flex-wrap:wrap;margin-bottom:0.5rem}
.badge{display:inline-block;padding:0.15rem 0.6rem;border-radius:12px;font-size:0.72rem;font-weight:600}
.badge-kind{background:var(--card);color:var(--muted)}
.badge-topic{background:var(--card);color:var(--muted)}
.badge-valid{background:rgba(26,127,55,0.15);color:var(--green)}
.badge-pending{background:rgba(207,143,36,0.15);color:var(--orange)}
.article-header h1{font-size:1.6rem;margin-bottom:0.25rem}
.article-header .canonical{font-family:monospace;font-size:0.8rem;color:var(--muted)}
.article-header .version{font-size:0.8rem;color:var(--muted)}
.links{display:flex;gap:1rem;margin:0.75rem 0;flex-wrap:wrap}
.links a{color:var(--accent);font-family:monospace;font-size:0.8rem;text-decoration:none}
.links a:hover{text-decoration:underline}
.tabs{display:flex;gap:0;border-bottom:2px solid var(--border);margin-bottom:1.5rem}
.tab{padding:0.5rem 1rem;cursor:pointer;font-size:0.85rem;color:var(--muted);border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .15s}
.tab:hover{color:var(--text)}
.tab.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:600}
.tab-content{display:none}
.tab-content.active{display:block}
.tab-content h2{font-size:1.3rem;margin:1.2rem 0 0.5rem;padding-bottom:0.3rem;border-bottom:1px solid var(--border)}
.tab-content h3{font-size:1.1rem;margin:1rem 0 0.4rem}
.tab-content p{margin-bottom:0.8rem}
.tab-content a{color:var(--accent)}
.tab-content blockquote{border-left:3px solid var(--orange);padding:0.5rem 1rem;margin:0.8rem 0;background:#fff8c5;border-radius:0 6px 6px 0}
.tab-content code{background:var(--card);padding:0.1rem 0.3rem;border-radius:4px;font-size:0.9em}
.tab-content ul,.tab-content ol{padding-left:1.5rem;margin-bottom:0.8rem}
.tab-content strong{color:var(--text)}
.attestation-card{background:var(--surface);border-radius:6px;padding:0.8rem 1rem;margin-bottom:0.5rem}
.attestation-card .opinion{font-weight:600;font-size:0.85rem}
.opinion-valid{color:var(--green)}
.opinion-invalid{color:#cf222e}
.opinion-partially-valid{color:var(--orange)}
.opinion-outdated{color:var(--muted)}
.opinion-disputed{color:#cf8f24}
.attestation-card .confidence{font-size:0.85rem;margin-left:0.5rem}
.attestation-card .reason{color:var(--muted);font-size:0.85rem;margin-top:0.3rem}
.attestation-card .agent{color:var(--muted);font-size:0.72rem;margin-top:0.2rem;font-family:monospace}
.consensus-box{background:var(--surface);border-radius:8px;padding:1.5rem;text-align:center}
.consensus-box .score{font-size:2.5rem;font-weight:700;color:var(--green)}
.consensus-box .label{font-size:0.85rem;color:var(--muted)}
.consensus-box .breakdown{display:flex;gap:1rem;justify-content:center;margin-top:1rem;flex-wrap:wrap}
.breakdown-item{text-align:center}
.breakdown-item .count{font-size:1.2rem;font-weight:600}
.breakdown-item .name{font-size:0.72rem;color:var(--muted)}
.empty-state{text-align:center;padding:4rem 2rem;color:var(--muted)}
.empty-state h2{font-size:1.3rem;color:var(--text);margin-bottom:0.5rem}
.empty-state p{font-size:0.9rem}
.home{padding-bottom:2rem}
.home h1{font-size:1.8rem;margin-bottom:0.25rem}
.home h1 span{color:var(--accent)}
.home-subtitle{color:var(--muted);font-size:0.9rem;margin-bottom:1.5rem}
.home-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:1rem}
.home-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:1.25rem;cursor:pointer;transition:border-color .15s,box-shadow .15s}
.home-card:hover{border-color:var(--accent);box-shadow:0 2px 8px rgba(9,105,218,0.12)}
.home-card-header{display:flex;gap:0.4rem;flex-wrap:wrap;margin-bottom:0.5rem}
.home-card h3{font-size:1.05rem;font-weight:600;margin-bottom:0.25rem}
.home-card-meta{color:var(--muted);font-size:0.8rem;margin-bottom:0.3rem}
.home-card-atts{color:var(--green);font-size:0.8rem}
.home-card-key{font-family:monospace;font-size:0.72rem;color:var(--accent);margin-top:0.4rem}
.home-more{color:var(--muted);font-size:0.85rem;text-align:center;margin-top:1rem}
.loading{display:flex;align-items:center;justify-content:center;padding:2rem;color:var(--muted);font-size:0.85rem}
.loading .spinner{display:inline-block;width:16px;height:16px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .6s linear infinite;margin-right:0.5rem}
@keyframes spin{to{transform:rotate(360deg)}}
.error-box{background:#fff8c5;border:1px solid #e3b341;border-radius:6px;padding:0.8rem 1rem;margin-bottom:1rem;font-size:0.85rem;color:#7a5900}
.mobile-toggle{display:none;position:fixed;top:0.75rem;left:0.75rem;z-index:100;background:var(--accent);color:#fff;border:none;border-radius:6px;padding:0.5rem 0.7rem;cursor:pointer;font-size:1.2rem}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.3);z-index:90}
@media(max-width:768px){
  .sidebar{position:fixed;left:0;top:0;bottom:0;z-index:95;transform:translateX(-100%)}
  .sidebar.open{transform:translateX(0)}
  .overlay.show{display:block}
  .mobile-toggle{display:block}
  .main{padding:1.5rem 1rem;padding-top:3rem}
}
</style>
</head>
<body>
<button class="mobile-toggle" onclick="toggleSidebar()">&#9776;</button>
<div class="overlay" id="overlay" onclick="toggleSidebar()"></div>
<div class="app">
<div class="sidebar" id="sidebar">
<div class="sidebar-header">
<h1>&#x1F9E0; <span>PermaBrain</span></h1>
<div class="subtitle">Public signed knowledge graph</div>
<input type="text" class="search" id="search" placeholder="Search articles..." oninput="renderList()">
<div class="filters" id="filters"></div>
</div>
<div class="status-bar" id="statusBar"><span id="statusText">Loading...</span><span id="statusCount"></span></div>
<div class="article-list" id="articleList"></div>
</div>
<div class="main" id="main">
<div class="empty-state" id="emptyState">
<h2>&#x1F9E0; PermaBrain Viewer</h2>
<p>Select an article from the sidebar to view its content, attestations, and consensus.</p>
<p style="margin-top:0.5rem;font-size:0.8rem;color:var(--muted)">Articles are signed ANS-104 DataItems on Arweave. Attestations are separate signed validity records.</p>
<div class="loading" id="loadingIndicator"><div class="spinner"></div> Fetching articles from Arweave...</div>
</div>
</div>
</div>
<script>
(function(){
  var GATEWAY = '';
  var articles = [];
  var attestations = {};
  var selectedKey = null;
  var activeTab = 'content';
  var activeFilter = 'all';
  var loading = true;
  var error = null;

  // --- IndexedDB cache (Karpathy wiki index pattern) ---
  var DB_NAME = 'permabrain-viewer';
  var DB_VERSION = 1;
  var db = null;

  function openDB() {
    return new Promise(function(resolve, reject) {
      var req = indexedDB.open(DB_NAME, DB_VERSION);
      req.onupgradeneeded = function(e) {
        var d = e.target.result;
        if (!d.objectStoreNames.contains('index')) {
          d.createObjectStore('index', { keyPath: 'id' });
        }
        if (!d.objectStoreNames.contains('content')) {
          d.createObjectStore('content', { keyPath: 'id' });
        }
      };
      req.onsuccess = function(e) { db = e.target.result; resolve(db); };
      req.onerror = function(e) { reject(e.target.error); };
    });
  }

  function dbGet(store, id) {
    return new Promise(function(resolve, reject) {
      var tx = db.transaction(store, 'readonly');
      var s = tx.objectStore(store);
      var r = s.get(id);
      r.onsuccess = function() { resolve(r.result || null); };
      r.onerror = function() { reject(r.error); };
    });
  }

  function dbPut(store, val) {
    return new Promise(function(resolve, reject) {
      var tx = db.transaction(store, 'readwrite');
      var s = tx.objectStore(store);
      var r = s.put(val);
      r.onsuccess = function() { resolve(); };
      r.onerror = function() { reject(r.error); };
    });
  }

  function dbGetAll(store) {
    return new Promise(function(resolve, reject) {
      var tx = db.transaction(store, 'readonly');
      var s = tx.objectStore(store);
      var r = s.getAll();
      r.onsuccess = function() { resolve(r.result || []); };
      r.onerror = function() { reject(r.error); };
    });
  }

  function dbClear(store) {
    return new Promise(function(resolve, reject) {
      var tx = db.transaction(store, 'readwrite');
      var s = tx.objectStore(store);
      var r = s.clear();
      r.onsuccess = function() { resolve(); };
      r.onerror = function() { reject(r.error); };
    });
  }

  // --- GraphQL with cursor pagination ---
  function gql(query, vars) {
    var body = vars ? {query: query, variables: vars} : {query: query};
    return fetch(GATEWAY + '/graphql', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(body)
    }).then(function(r){ return r.json(); });
  }

  function tagsToObject(tags) {
    var obj = {};
    (tags || []).forEach(function(t){ obj[t.name] = t.value; });
    return obj;
  }

  // --- Fetch all PermaBrain txs, paginate with cursor ---
  async function fetchAllPages() {
    var allEdges = [];
    var after = null;
    var hasMore = true;
    var pages = 0;
    while (hasMore && pages < 10) {
      var q = '{ transactions(first: 100, tags: [{name: "App-Name", values: ["PermaBrain"]}]' +
        (after ? ', after: "' + after + '"' : '') +
        ') { edges { cursor node { id tags { name value } } } pageInfo { hasNextPage } } }';
      var data = await gql(q);
      if (data.errors) throw new Error(data.errors.map(function(e){return e.message}).join('; '));
      var tx = data.data.transactions;
      var edges = tx.edges || [];
      allEdges = allEdges.concat(edges);
      hasMore = tx.pageInfo && tx.pageInfo.hasNextPage;
      // Use last edge's cursor for next page
      if (edges.length > 0) {
        after = edges[edges.length - 1].cursor;
      } else {
        hasMore = false;
      }
      pages++;
    }
    return allEdges;
  }

  // --- Process edges into articles + attestations, dedup by key+version ---
  function processEdges(edges) {
    var articleItems = {};
    edges.forEach(function(e) {
      var t = tagsToObject(e.node.tags);
      var type = t['PermaBrain-Type'];
      // Store raw tx in IndexedDB
      dbPut('index', { id: e.node.id, tags: e.node.tags, type: type, cursor: e.cursor }).catch(function(){});
      if (type === 'article') {
        var k = t['Article-Key'];
        if (!k) return;
        var v = Number(t['Article-Version'] || 0);
        if (!articleItems[k] || v > Number(tagsToObject(articleItems[k].tags)['Article-Version'] || 0)) {
          articleItems[k] = { id: e.node.id, tags: e.node.tags };
        }
      } else if (type === 'attestation') {
        var targetKey = t['Attestation-Target-Key'];
        if (!targetKey) return;
        if (!attestations[targetKey]) attestations[targetKey] = [];
        // Dedup by id
        if (attestations[targetKey].some(function(a){ return a.id === e.node.id; })) return;
        attestations[targetKey].push({
          id: e.node.id,
          targetId: t['Attestation-Target-Id'] || '',
          targetKey: targetKey,
          opinion: t['Attestation-Opinion'] || '',
          confidence: Number(t['Attestation-Confidence'] || 0),
          reason: t['Attestation-Reason'] || '',
          agentId: t['Attestation-Agent-Id'] || '',
          createdAt: t['Attestation-Created-At'] || ''
        });
      }
    });
    return articleItems;
  }

  // --- Main sync: load cache, then fetch new, merge, save cursor ---
  async function syncAll() {
    loading = true;
    error = null;
    renderStatus();

    // 1. Load cached index from IndexedDB
    var savedCursor = null;
    try {
      var metaRow = await dbGet('index', '__meta__');
      if (metaRow) savedCursor = metaRow.cursor || null;
    } catch(e) {}

    // 2. Load cached articles/attestations from IndexedDB
    try {
      var allRows = await dbGetAll('index');
      var cachedEdges = allRows
        .filter(function(r){ return r.id && r.id !== '__meta__' && r.tags; })
        .map(function(r){ return { node: { id: r.id, tags: r.tags }, cursor: r.cursor }; });
      if (cachedEdges.length) processEdges(cachedEdges);
    } catch(e) {}

    // 3. Fetch ALL PermaBrain txs from GraphQL (with pagination)
    var allEdges = [];
    try {
      allEdges = await fetchAllPages();
    } catch(e) {
      error = 'GraphQL fetch failed: ' + e.message;
      loading = false;
      renderStatus();
      return;
    }

    // 4. Merge all edges into cache + articles/attestations
    processEdges(allEdges);

    // 5. Build articles array from merged data
    var articleItems = {};
    articles = [];
    // Combine cached + fresh edges
    allEdges.forEach(function(e) {
      var t = tagsToObject(e.node.tags);
      if (t['PermaBrain-Type'] === 'article') {
        var k = t['Article-Key'];
        if (!k) return;
        var v = Number(t['Article-Version'] || 0);
        if (!articleItems[k] || v > Number(tagsToObject(articleItems[k].tags)['Article-Version'] || 0)) {
          articleItems[k] = { id: e.node.id, tags: e.node.tags };
        }
      }
    });

    articles = Object.keys(articleItems).map(function(k) {
      var item = articleItems[k];
      var t = tagsToObject(item.tags);
      return {
        key: t['Article-Key'],
        id: item.id,
        title: t['Article-Title'] || k,
        kind: t['Article-Kind'] || 'unknown',
        topic: t['Article-Topic'] || '',
        version: Number(t['Article-Version'] || 1),
        sourceName: t['Article-Source-Name'] || '',
        sourceUrl: t['Article-Source-Url'] || '',
        authorId: t['Author-Agent-Id'] || '',
        contentHash: t['Article-Content-Hash'] || '',
        updatedAt: t['Article-Updated-At'] || '',
        language: t['Article-Language'] || 'en',
        arweaveUrl: GATEWAY + '/' + item.id,
        _tags: t,
        _content: null,
        _contentLoading: false,
        _contentError: null
      };
    });

    // 6. Save cursor from last edge
    var lastCursor = allEdges.length ? allEdges[allEdges.length - 1].cursor : null;
    try { await dbPut('index', { id: '__meta__', cursor: lastCursor, updatedAt: new Date().toISOString(), articleCount: articles.length }); } catch(e) {}

    loading = false;
    renderFilters();
    renderList();
    renderStatus();
    if (selectedKey) renderArticle(selectedKey);
    else renderHome();
  }

  // --- Content caching in IndexedDB ---
  function fetchContent(article) {
    if (article._content !== null || article._contentLoading) return;
    // Try cache first
    dbGet('content', article.id).then(function(cached) {
      if (cached && cached.text) {
        article._content = cached.text;
        if (selectedKey === article.key) renderArticle(selectedKey);
        return;
      }
      // Not cached — fetch from Arweave
      article._contentLoading = true;
      fetch(GATEWAY + '/' + article.id)
      .then(function(r) { return r.text(); })
      .then(function(text) {
        if (text.trimStart().startsWith('<')) {
          article._content = null;
          article._contentError = 'Content not available on gateway';
        } else {
          article._content = text;
          // Cache it
          dbPut('content', { id: article.id, text: text, fetchedAt: new Date().toISOString() }).catch(function(){});
        }
        article._contentLoading = false;
        if (selectedKey === article.key) renderArticle(selectedKey);
      })
      .catch(function(err) {
        article._contentLoading = false;
        article._contentError = err.message;
        if (selectedKey === article.key) renderArticle(selectedKey);
      });
    }).catch(function() {
      // IndexedDB error — just fetch
      article._contentLoading = true;
      fetch(GATEWAY + '/' + article.id)
      .then(function(r) { return r.text(); })
      .then(function(text) {
        if (text.trimStart().startsWith('<')) {
          article._content = null;
          article._contentError = 'Content not available on gateway';
        } else {
          article._content = text;
        }
        article._contentLoading = false;
        if (selectedKey === article.key) renderArticle(selectedKey);
      })
      .catch(function(err) {
        article._contentLoading = false;
        article._contentError = err.message;
        if (selectedKey === article.key) renderArticle(selectedKey);
      });
    });
  }

  function getConsensus(key) {
    var atts = attestations[key] || [];
    if (!atts.length) return { score: null, totalAttestations: 0, status: 'unattested', breakdown: {} };
    var scores = { valid: 1, 'partially-valid': 0.5, outdated: 0.25, disputed: 0, invalid: 0 };
    var breakdown = {};
    var total = 0;
    atts.forEach(function(a) {
      var op = a.opinion || 'valid';
      breakdown[op] = (breakdown[op] || 0) + 1;
      total += (scores[op] || 0) * a.confidence;
    });
    var maxPossible = atts.reduce(function(s, a){ return s + a.confidence; }, 0);
    return {
      score: maxPossible > 0 ? Math.round(total / maxPossible * 100) / 100 : 0,
      totalAttestations: atts.length,
      status: atts.some(function(a){return a.opinion==='valid'}) ? 'attested' : 'mixed',
      breakdown: breakdown
    };
  }

  function esc(s){var d=document.createElement('div');d.textContent=s;return d.innerHTML}

  function getKinds(){
    var kinds = new Set();
    articles.forEach(function(a){kinds.add(a.kind)});
    return ['all'].concat(Array.from(kinds).sort());
  }

  function renderFilters(){
    var kinds = getKinds();
    var el = document.getElementById('filters');
    el.innerHTML = kinds.map(function(k){
      return '<button class="filter-btn'+(activeFilter===k?' active':'')+'" onclick="window.setFilter(\''+k+'\')">'+esc(k==='all'?'All':k)+'</button>';
    }).join('');
  }

  function renderStatus(){
    var statusEl = document.getElementById('statusText');
    var countEl = document.getElementById('statusCount');
    if (loading) {
      statusEl.innerHTML = '<span class="spinner" style="display:inline-block;width:12px;height:12px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle;margin-right:4px"></span> Syncing...';
    } else if (error) {
      statusEl.textContent = 'Error: ' + error;
    } else {
      statusEl.textContent = 'Cached';
    }
    countEl.textContent = articles.length + ' article' + (articles.length !== 1 ? 's' : '');
  }

  function renderHome(){
    var main = document.getElementById('main');
    if (error) {
      main.innerHTML = '<div class="empty-state"><h2>Could not load articles</h2><p>' + esc(error) + '</p></div>';
      return;
    }
    if (articles.length === 0) {
      main.innerHTML = '<div class="empty-state"><h2>No articles found</h2><p>No PermaBrain articles discovered on Arweave yet.</p></div>';
      return;
    }
    // Sort by updatedAt descending
    var sorted = articles.slice().sort(function(a, b) { return (b.updatedAt || '').localeCompare(a.updatedAt || ''); });
    var recent = sorted.slice(0, 10);
    var cards = recent.map(function(a) {
      var atts = attestations[a.key] || [];
      var cons = getConsensus(a.key);
      var badgeClass = cons.status === 'attested' ? 'badge-valid' : 'badge-pending';
      var badgeLabel = cons.status === 'attested' ? '\u2713 Attested' : (cons.status === 'unattested' ? 'Unattested' : 'Mixed');
      return '<div class="home-card" data-key="' + esc(a.key) + '" onclick="window.selectArticle(\'' + esc(a.key) + '\')"\u003e' +
        '<div class="home-card-header">' +
        '<span class="badge badge-kind">' + esc(a.kind) + '</span\u003e' +
        '<span class="badge badge-topic">' + esc(a.topic) + '</span\u003e' +
        '<span class="badge ' + badgeClass + '">' + badgeLabel + '</span\u003e' +
        '</div>' +
        '<h3>' + esc(a.title) + '</h3>' +
        '<div class="home-card-meta">v' + a.version + ' &middot; ' + esc(a.sourceName) + (a.updatedAt ? ' &middot; ' + new Date(a.updatedAt).toLocaleDateString() : '') + '</div>' +
        (atts.length ? '<div class="home-card-atts">\u2713 ' + esc(atts[0].opinion) + ' (' + atts[0].confidence + ')</div>' : '') +
        '<div class="home-card-key">' + esc(a.key) + '</div>' +
        '</div>';
    }).join('');
    main.innerHTML = '<div class="home">' +
      '<h1>\uD83E\uDDE0 PermaBrain</h1>' +
      '<p class="home-subtitle">Public signed knowledge graph on Arweave</p>' +
      '<div class="home-cards">' + cards + '</div>' +
      (sorted.length > 10 ? '<p class="home-more">Showing 10 of ' + sorted.length + ' articles</p>' : '') +
      '</div>';
  }

  function renderEmptyState(){ renderHome(); }

  function renderList(){
    var q = (document.getElementById('search').value||'').toLowerCase();
    var filtered = articles.filter(function(a){
      if(activeFilter!=='all' && a.kind!==activeFilter) return false;
      if(q && a.title.toLowerCase().indexOf(q)===-1 && a.key.toLowerCase().indexOf(q)===-1 && a.topic.toLowerCase().indexOf(q)===-1) return false;
      return true;
    });
    var el = document.getElementById('articleList');
    if(!filtered.length && !loading){
      el.innerHTML='<div style="padding:1rem;text-align:center;color:var(--muted);font-size:0.85rem">No articles match</div>';
      return;
    }
    el.innerHTML = filtered.map(function(a){
      var atts = attestations[a.key] || [];
      var attBadge = atts.length ? '<span style="color:var(--green);font-size:0.72rem">&#10003; '+esc(atts[0].opinion)+'</span>' : '';
      return '<div class="article-item'+(selectedKey===a.key?' selected':'')+'" data-key="'+esc(a.key)+'" onclick="window.selectArticle(\''+esc(a.key)+'\')">'
        +'<div class="key">'+esc(a.key)+'</div>'
        +'<div class="title">'+esc(a.title)+'</div>'
        +'<div class="meta">'+esc(a.kind)+' &middot; '+esc(a.topic)+' &middot; v'+a.version+' '+attBadge+'</div>'
        +'</div>';
    }).join('');
  }

  function renderArticle(key){
    var a = articles.find(function(x){return x.key===key});
    if(!a){
      document.getElementById('main').innerHTML='<div class="empty-state"><h2>Article not found</h2></div>';
      return;
    }
    selectedKey = key;
    renderList();

    // Fetch content if not yet loaded
    if (a._content === null && !a._contentLoading && !a._contentError) {
      fetchContent(a);
    }

    var contentHtml = '';
    if (a._contentLoading) {
      contentHtml = '<div class="loading"><div class="spinner"></div> Loading content...</div>';
    } else if (a._contentError) {
      contentHtml = '<div class="error-box">Could not load article content: ' + esc(a._contentError) + '</div>';
    } else if (a._content) {
      contentHtml = (typeof marked !== 'undefined' && marked.parse) ? marked.parse(a._content) : '<pre>' + esc(a._content) + '</pre>';
    } else {
      contentHtml = '<p style="color:var(--muted)">Content not yet available.</p>';
    }

    var atts = attestations[a.key] || [];
    var consensus = getConsensus(a.key);

    var badgeClass = consensus.status === 'attested' ? 'badge-valid' : 'badge-pending';
    var badgeLabel = consensus.status === 'attested' ? '&#10003; Attested' : (consensus.status === 'unattested' ? 'Unattested' : 'Mixed');

    var attCards = atts.map(function(att){
      var opClass = 'opinion-' + att.opinion.replace(' ', '-');
      return '<div class="attestation-card">'
        +'<span class="opinion '+opClass+'">'+esc(att.opinion.toUpperCase())+'</span>'
        +'<span class="confidence">confidence: '+att.confidence+'</span>'
        +'<div class="reason">'+esc(att.reason)+'</div>'
        +'<div class="agent">by '+esc(att.agentId.substring(0,40))+'</div>'
        +'</div>';
    }).join('');

    var breakdown = '';
    if (consensus.breakdown && Object.keys(consensus.breakdown).length) {
      breakdown = '<div class="breakdown">';
      Object.keys(consensus.breakdown).forEach(function(op){
        breakdown += '<div class="breakdown-item"><div class="count">'+consensus.breakdown[op]+'</div><div class="name">'+esc(op)+'</div></div>';
      });
      breakdown += '</div>';
    }

    var html = '<div class="article-header">'
      +'<div class="badges">'
      +'<span class="badge badge-kind">'+esc(a.kind)+'</span>'
      +'<span class="badge badge-topic">'+esc(a.topic)+'</span>'
      +'<span class="badge '+badgeClass+'">'+badgeLabel+'</span>'
      +'</div>'
      +'<h1>'+esc(a.title)+'</h1>'
      +'<div class="canonical">'+esc(a.key)+'</div>'
      +'<div class="version">v'+a.version+' &middot; '+esc(a.sourceName)+' &middot; '+(a.updatedAt ? new Date(a.updatedAt).toLocaleDateString() : '')+'</div>'
      +'<div class="links">'
      +'<a href="https://arweave.net/'+a.id+'" target="_blank">&#x1F517; Arweave</a>'
      +(a.sourceUrl ? '<a href="'+esc(a.sourceUrl)+'" target="_blank">&#x1F4C4; Source</a>' : '')
      +'</div></div>'
      +'<div class="tabs">'
      +'<div class="tab'+(activeTab==='content'?' active':'')+'" onclick="window.setTab(\'content\')">Content</div>'
      +'<div class="tab'+(activeTab==='attestations'?' active':'')+'" onclick="window.setTab(\'attestations\')">Attestations ('+consensus.totalAttestations+')</div>'
      +'<div class="tab'+(activeTab==='consensus'?' active':'')+'" onclick="window.setTab(\'consensus\')">Consensus</div>'
      +'</div>'
      +'<div class="tab-content'+(activeTab==='content'?' active':'')+'" id="tab-content">'+contentHtml+'</div>'
      +'<div class="tab-content'+(activeTab==='attestations'?' active':'')+'" id="tab-attestations">'
      +(attCards || '<p style="color:var(--muted)">No attestations yet.</p>')
      +'</div>'
      +'<div class="tab-content'+(activeTab==='consensus'?' active':'')+'" id="tab-consensus">'
      +'<div class="consensus-box">'
      +'<div class="score">'+(consensus.score !== null ? consensus.score : 'N/A')+'</div>'
      +'<div class="label">Consensus Score</div>'
      +breakdown
      +'</div></div>';

    document.getElementById('main').innerHTML = html;

    // Close sidebar on mobile
    if(window.innerWidth <= 768){
      document.getElementById('sidebar').classList.remove('open');
      document.getElementById('overlay').classList.remove('show');
    }
  }

  window.selectArticle = function(key){
    activeTab = 'content';
    renderArticle(key);
  };

  window.setTab = function(tab){
    activeTab = tab;
    if(selectedKey) renderArticle(selectedKey);
  };

  window.setFilter = function(kind){
    activeFilter = kind;
    renderFilters();
    renderList();
  };

  window.toggleSidebar = function(){
    document.getElementById('sidebar').classList.toggle('open');
    document.getElementById('overlay').classList.toggle('show');
  };

  // Detect gateway from current hostname
  if (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1') {
    GATEWAY = 'https://arweave.net';
  } else if (window.location.hostname.endsWith('.arweave.net') || window.location.hostname === 'arweave.net') {
    GATEWAY = '';
  } else {
    GATEWAY = 'https://arweave.net';
  }

  renderFilters();
  renderList();
  openDB().then(function() {
    syncAll();
  }).catch(function(err) {
    console.error('IndexedDB open failed:', err);
    syncAll(); // Fall back to no-cache mode
  });
})();
</script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</body>
</html>
